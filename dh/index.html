<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>敦煌测试题</title>

<style>
  .nav-buttons {
    display: flex;
    gap: 10px;
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background-color: #409eff;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-btn:hover {
    background-color: #66b1ff;
  }
</style>
</head>

<body>

<a><strong>欢迎来到敦煌测试题</strong></a>
<div class="nav-buttons">
  <!-- 上一步 -->
  <button class="nav-btn" onclick="goBack()">←</button>

  <!-- 下一步 -->
  <button class="nav-btn" onclick="goNext()">→</button>
</div>

<script>
  function goBack() {
    // 返回上一页（如果历史记录存在）
    if (window.history.length > 1) {
      window.history.back();
    } else {
      // 否则跳转到一个固定页面
      window.location.href = "https://example.com/back";
    }
  }

  function goNext() {
    // 跳转到下一个页面
    window.location.href = "https://example.com/next";
  }
</script>

</body>
</html>
